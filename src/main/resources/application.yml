server:
  port: 8081

spring:
  datasource:
    # 文件库相对「进程工作目录」。换目录启动会指向另一份库，表现为会话记录丢失。生产建议改为绝对路径。
    url: jdbc:h2:file:./data/feishu-robot-adapter
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  auth:
    session-key: LOGIN_USER
    default-admin-username: ${ADMIN_USERNAME:admin}
    default-admin-password: ${ADMIN_PASSWORD:admin123}
