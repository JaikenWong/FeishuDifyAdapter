server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/feishu-robot-adapter
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  auth:
    session-key: LOGIN_USER
    default-admin-username: admin
    default-admin-password: admin123
